services:
  - type: web
    name: hotelscope-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
